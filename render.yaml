# Render Blueprint. In Render dashboard: New > Blueprint > pick this repo.
#
# Provisions two services from one config:
#   1. morning-story-ranker          — Next.js web app
#   2. morning-story-ranker-cron     — fires at 09:00 UTC daily, curls (1)
#
# After "Create Blueprint", Render prompts for the env vars below marked
# "sync: false" — fill them in once and they persist across deploys.
#
# AUTH_SECRET and CRON_TOKEN are generated by Render at creation time and
# automatically shared from the web service to the cron service via the
# `fromService` block — no manual copying required.

services:
  - type: web
    name: morning-story-ranker
    runtime: node
    plan: starter # $7/mo always-on. Free tier sleeps and would miss the cron POST.
    region: oregon
    buildCommand: npm install && npm run build
    # Run DB migrations + seed before each deploy boots. Safe to re-run; already
    # applied migrations are skipped, the seed is idempotent.
    preDeployCommand: npm run db:init
    startCommand: npm start
    healthCheckPath: /login
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: NODE_VERSION
        value: "20"

      # --- Generated by Render on first deploy ---
      - key: AUTH_SECRET
        generateValue: true
      - key: CRON_TOKEN
        generateValue: true

      # --- Filled in via Render dashboard at Blueprint creation ---
      - key: DATABASE_URL
        sync: false               # Neon pooled connection string
      - key: RESEND_API_KEY
        sync: false               # Resend API key
      - key: MAIL_FROM
        sync: false               # "Morning Story Ranker <noreply@yourdomain.com>"
      - key: INITIAL_ALLOWED_EMAILS
        sync: false               # Comma-separated emails seeded into allowed_emails on every deploy.
                                  # Remove or leave blank once you have a working admin login.

      # PUBLIC_BASE_URL has a code-side fallback to RENDER_EXTERNAL_URL (set
      # automatically by Render) so magic-link emails work out of the box.
      # Set this explicitly only if you put a custom domain in front.
      - key: PUBLIC_BASE_URL
        sync: false

  - type: cron
    name: morning-story-ranker-cron
    runtime: node
    plan: starter
    region: oregon
    schedule: "0 9 * * *" # 09:00 UTC daily — see PRD §Data Inputs
    buildCommand: ""
    startCommand: sh scripts/cron-trigger.sh
    envVars:
      - key: CRON_VERTICAL
        value: gaming

      # Pull token + URL from the web service so they always stay in sync.
      - key: CRON_TOKEN
        fromService:
          type: web
          name: morning-story-ranker
          envVarKey: CRON_TOKEN
      - key: CRON_TARGET_URL
        fromService:
          type: web
          name: morning-story-ranker
          property: host           # Render-assigned public hostname; cron script prepends https://
